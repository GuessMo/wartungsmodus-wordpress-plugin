name: Deploy Wartungsmodus WordPress Plugin

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

env:
  DEPLOY_ARTIFACT_NAME: wartungsmodus-deploy
  DEPLOY_ARTIFACT_DIR: /tmp/wartungsmodus-deploy
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Stage deploy artifact
        run: |
          mkdir -p "$DEPLOY_ARTIFACT_DIR"
          rsync -a \
            --exclude='.github/' \
            --exclude='node_modules/' \
            --exclude='.gitignore' \
            --exclude='*.md' \
            ./ \
            "$DEPLOY_ARTIFACT_DIR/"

      - name: Upload deploy artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.DEPLOY_ARTIFACT_NAME }}
          path: ${{ env.DEPLOY_ARTIFACT_DIR }}/
          if-no-files-found: error

  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download deploy artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ env.DEPLOY_ARTIFACT_NAME }}
          path: ${{ env.DEPLOY_ARTIFACT_DIR }}

      - name: Prepare SSH key
        env:
          HETZNER_HOST: ${{ secrets.HETZNER_HOST }}
          HETZNER_SSH_KEY: ${{ secrets.HETZNER_SSH_KEY }}
        run: |
          test -n "$HETZNER_HOST"
          test -n "$HETZNER_SSH_KEY"
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$HETZNER_SSH_KEY" | tr -d '\r' > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "$HETZNER_HOST" >> ~/.ssh/known_hosts

      - name: Deploy plugin to Hetzner
        env:
          HETZNER_HOST: ${{ secrets.HETZNER_HOST }}
          HETZNER_USER: ${{ secrets.HETZNER_USER }}
          HETZNER_TARGET_DIR: ${{ secrets.HETZNER_TARGET_DIR }}
        run: |
          test -n "$HETZNER_HOST"
          test -n "$HETZNER_USER"
          test -n "$HETZNER_TARGET_DIR"
          ssh -i ~/.ssh/id_ed25519 "$HETZNER_USER@$HETZNER_HOST" "mkdir -p '$HETZNER_TARGET_DIR'"
          rsync -az --delete \
            -e "ssh -i ~/.ssh/id_ed25519" \
            "$DEPLOY_ARTIFACT_DIR/" \
            "$HETZNER_USER@$HETZNER_HOST:$HETZNER_TARGET_DIR/"
